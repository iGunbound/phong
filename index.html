<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHONG Movie</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#000;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
  transform:scale(1.1);
  transform-origin:top center;
  width:90.9%;
  margin:auto;
}

/* ===== HEADER ===== */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
}

.logo{
  font-size:26px;
  font-weight:700;
  color:red;
}

.search-box{
  position:relative;
}

.search-box input{
  padding:8px 35px 8px 15px;
  border-radius:20px;
  border:none;
  outline:none;
  background:#222;
  color:#fff;
}

.search-box span{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
}

/* ===== SLIDER ===== */
.slider{
  overflow:hidden;
  padding:10px 40px 30px;
}

.slider-track{
  display:flex;
  gap:20px;
  animation:slide 40s linear infinite alternate;
}

.slider img{
  width:220px;
  height:330px;
  object-fit:cover;
  border-radius:14px;
}

@keyframes slide{
  from{transform:translateX(0)}
  to{transform:translateX(-300px)}
}

/* ===== SECTION HEADER ===== */
.section-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 40px 20px;
  flex-wrap:wrap;
}

.section-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.section-left h2{
  font-size:22px;
}

.tabs{
  display:flex;
  gap:10px;
}

.tab{
  padding:6px 15px;
  border-radius:18px;
  background:#222;
  cursor:pointer;
  font-size:13px;
}

.tab.active{
  background:red;
}

/* ===== MARQUEE ===== */
.marquee{
  color:#ff3b3b;
  font-size:16px;
  overflow:hidden;
  white-space:nowrap;
  position:relative;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:marqueeMove 18s linear infinite;
}

@keyframes marqueeMove{
  from{transform:translateX(0)}
  to{transform:translateX(-100%)}
}

/* ===== MOVIE GRID ===== */
.movie-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:25px;
  padding:0 40px 50px;
}

.movie-card{
  background:linear-gradient(145deg,#111,#1a1a1a);
  padding:25px 20px;
  border-radius:16px;
  min-height:150px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:.25s;
  border:1px solid #222;
}

.movie-card:hover{
  transform:translateY(-6px);
  border:1px solid red;
  box-shadow:0 10px 25px rgba(255,0,0,0.15);
}

.movie-card h4{
  font-size:15px;
  line-height:1.4;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.btn{
  padding:6px 14px;
  border-radius:18px;
  font-size:12px;
  text-decoration:none;
  color:#fff;
  font-weight:600;
}

.tm{background:#ff2e2e}
.vs{background:#2d8cff}

/* ===== PAGINATION ===== */
.pagination{
  text-align:center;
  padding-bottom:40px;
}

.page-btn{
  display:inline-block;
  padding:6px 12px;
  margin:3px;
  background:#222;
  border-radius:8px;
  cursor:pointer;
}

.page-btn.active{
  background:red;
}

/* ===== RESPONSIVE ===== */
@media(max-width:1200px){
  .movie-grid{grid-template-columns:repeat(4,1fr);}
}

@media(max-width:900px){
  .movie-grid{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:768px){

  body{
    transform:none;
    width:100%;
  }

  header{
    padding:15px;
    flex-direction:column;
    gap:10px;
  }

  .logo{font-size:22px;}

  .slider{
    padding:10px 15px 20px;
  }

  .slider img{
    width:160px;
    height:240px;
  }

  .section-top{
    padding:0 15px 15px;
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

  .section-left{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

  .movie-grid{
    padding:0 15px 40px;
    gap:15px;
  }

  .movie-card{
    padding:18px 15px;
  }

  .movie-card h4{
    font-size:14px;
  }

  .btn{
    font-size:11px;
    padding:5px 10px;
  }
}

@media(max-width:600px){
  .movie-grid{grid-template-columns:repeat(2,1fr);}
}

</style>
</head>
<body>

<header>
  <div class="logo">PHONG Movie</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm phim...">
    <span>🔍</span>
  </div>
</header>

<!-- SLIDER -->
<div class="slider">
  <div class="slider-track" id="sliderTrack"></div>
</div>

<!-- SECTION TOP -->
<div class="section-top">
  <div class="section-left">
    <h2>Danh sách phim</h2>
    <div class="tabs">
      <div class="tab active" data-type="all">Tất cả</div>
      <div class="tab" data-type="thuyetMinh">Thuyết Minh</div>
      <div class="tab" data-type="vietsub">Vietsub</div>
    </div>
  </div>
  <div class="marquee">
    <span>Nếu xem phim thấy hay và mượt hãy ủng hộ vào Số tài khoản 0705 86 0000 MB Bank</span>
  </div>
</div>

<!-- MOVIES -->
<div class="movie-grid" id="movieGrid"></div>
<div class="pagination" id="pagination"></div>

<script>
let originalMovies=[];
let movies=[];
let currentPage=1;
const perPage=20;
let currentFilter="all";

async function loadSlider(){
  const res=await fetch("slider.json");
  const data=await res.json();
  const track=document.getElementById("sliderTrack");
  data.forEach(item=>{
    const img=document.createElement("img");
    img.src=item.image;
    track.appendChild(img);
  });
}

async function loadMovies(){
  const res=await fetch("movies.json");
  originalMovies=await res.json();
  movies=[...originalMovies];
  renderMovies();
}

function renderMovies(){
  const grid=document.getElementById("movieGrid");
  const pagination=document.getElementById("pagination");
  grid.innerHTML="";
  pagination.innerHTML="";

  let filtered=movies.filter(m=>{
    if(currentFilter==="thuyetMinh") return m.thuyetMinh;
    if(currentFilter==="vietsub") return m.vietsub;
    return true;
  });

  const totalPages=Math.ceil(filtered.length/perPage);
  const start=(currentPage-1)*perPage;
  const pageItems=filtered.slice(start,start+perPage);

  pageItems.forEach(m=>{
    const card=document.createElement("div");
    card.className="movie-card";
    card.innerHTML=`
      <h4>${m.title}</h4>
      <div class="buttons">
        ${m.thuyetMinh?`<a href="${m.thuyetMinh}" class="btn tm">Thuyết Minh</a>`:""}
        ${m.vietsub?`<a href="${m.vietsub}" class="btn vs">Vietsub</a>`:""}
      </div>
    `;
    grid.appendChild(card);
  });

  for(let i=1;i<=totalPages;i++){
    const btn=document.createElement("span");
    btn.className="page-btn"+(i===currentPage?" active":"");
    btn.innerText=i;
    btn.onclick=()=>{
      currentPage=i;
      renderMovies();
      window.scrollTo(0,0);
    };
    pagination.appendChild(btn);
  }
}

document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    currentFilter=tab.dataset.type;
    currentPage=1;
    renderMovies();
  };
});

document.getElementById("searchInput").addEventListener("input",e=>{
  const value=e.target.value.toLowerCase();
  movies=originalMovies.filter(m=>m.title.toLowerCase().includes(value));
  currentPage=1;
  renderMovies();
});

loadSlider();
loadMovies();
</script>

</body>
</html>
